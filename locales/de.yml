# target_mode
target_mode_group_title: "Zielmodus (Inaktiv abdunkeln)"
target_mode_group_desc: "Dunkelt inaktive Fenster ab, während das fokussierte Fenster in voller Helligkeit bleibt. Reduziert den OLED-Stromverbrauch beim fokussierten Arbeiten."
